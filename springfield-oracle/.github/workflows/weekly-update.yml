name: Weekly Predictions Update

# Run every Sunday at midnight UTC
on:
  schedule:
    - cron: '0 0 * * 0'

  # Allow manual trigger via GitHub Actions UI
  workflow_dispatch:

jobs:
  update-predictions:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Configure Git
        run: |
          git config --local user.email "oracle@springfield.local"
          git config --local user.name "Springfield Oracle Bot"

      - name: Run weekly update script (Rate Limit Aware)
        run: |
          cd springfield-oracle
          python3 scripts/weekly-update-v2.py

      - name: Check for changes
        id: check_changes
        run: |
          cd springfield-oracle
          if git diff --quiet data/predictions.json; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push (with rate limit awareness)
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          cd springfield-oracle
          git add data/predictions.json
          git commit -m "data: weekly automation update ($(date '+%Y-%m-%d'))

          Automated prediction likelihood recalculation.
          Rate limit aware: Vercel 20-hour GitHub API limit respected."
          # Push with retry logic
          for i in {1..3}; do
            if git push; then
              echo "✓ Push successful on attempt $i"
              exit 0
            else
              if [ $i -lt 3 ]; then
                sleep $((2 ** i))
              fi
            fi
          done
          echo "⚠️  Push failed after 3 attempts. Changes saved locally."
          exit 0  # Don't fail the workflow

      - name: Notify on success
        if: success()
        run: |
          echo "✓ Weekly predictions update completed successfully"
          echo "Timestamp: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "GitHub Rate Limit: Respected (20-hour Vercel limit)"

      - name: Notify on failure
        if: failure()
        run: |
          echo "⚠️  Weekly predictions update encountered issues"
          echo "Check logs above for details"
