name: Sunday Prediction Update

on:
  schedule:
    # Every Sunday at 00:00 UTC
    - cron: '0 0 * * 0'
  workflow_dispatch: # Allow manual trigger

jobs:
  update-predictions:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests feedparser anthropic

      - name: Run prediction update script
        run: |
          python springfield-oracle/public/update-predictions.py

      - name: Run news monitor
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python springfield-oracle/scripts/news-monitor.py --apply
        working-directory: springfield-oracle

      - name: Rebuild static pages
        run: |
          node springfield-oracle/scripts/generate-static.js

      - name: Configure Git
        run: |
          git config --local user.email "automation@springfield-oracle.dev"
          git config --local user.name "Springfield Oracle Bot"

      - name: Commit and push updated predictions
        run: |
          git add springfield-oracle/data/predictions.json \
                  springfield-oracle/public/data/predictions.json \
                  springfield-oracle/public/simpsons-*.html \
                  springfield-oracle/public/p/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "data: weekly news monitor update ($(date +'%Y-%m-%d'))"
            git push
          fi

      - name: Log update completion
        run: |
          echo "Update completed at $(date -u)"
          echo "Pending predictions: $(grep -c '"status": "pending"' springfield-oracle/public/data/predictions.json || echo 0)"
